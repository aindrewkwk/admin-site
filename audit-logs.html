<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://web.lbby.net; base-uri 'self'; form-action 'self';">
  <title>Audit Logs — R Studio Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="https://lbby.net/assets/favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #09090b;
      color: #e4e4e7;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    ::selection { background: #8b5cf6; color: white; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .layout { display: flex; min-height: 100vh; }

    /* ── Sidebar ────────────────────────────────────────────────── */
    .sidebar {
      width: 240px;
      background: #0c0c0e;
      border-right: 1px solid #1a1a1e;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
      transition: transform 0.25s ease;
    }
    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 20px;
      border-bottom: 1px solid #1a1a1e;
      margin-bottom: 8px;
    }
    .sidebar-brand img { width: 28px; height: 28px; border-radius: 6px; }
    .sidebar-brand span { font-size: 14px; font-weight: 700; color: #fafafa; }
    .sidebar-brand small { font-size: 10px; color: #71717a; font-weight: 500; margin-left: auto; background: #1a1a1e; padding: 2px 6px; border-radius: 4px; }
    .sidebar-nav { flex: 1; padding: 4px 8px; }
    .sidebar-section { padding: 12px 12px 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #52525b; }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
      text-decoration: none;
      transition: all 0.15s ease;
      margin-bottom: 2px;
    }
    .sidebar-link:hover { background: #18181b; color: #e4e4e7; }
    .sidebar-link.active { background: #8b5cf6; color: white; }
    .sidebar-link svg { width: 16px; height: 16px; opacity: 0.7; }
    .sidebar-link.active svg { opacity: 1; }
    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid #1a1a1e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-footer .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #27272a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #a1a1aa;
    }
    .sidebar-footer .user-info { flex: 1; }
    .sidebar-footer .user-name { font-size: 12px; font-weight: 600; color: #e4e4e7; }
    .sidebar-footer .user-role { font-size: 10px; color: #71717a; }
    .sidebar-footer .logout-btn {
      padding: 4px 8px;
      font-size: 11px;
      color: #71717a;
      border: 1px solid #27272a;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .sidebar-footer .logout-btn:hover { color: #ef4444; border-color: #ef4444; background: rgba(239,68,68,0.1); }

    /* ── Main Content ───────────────────────────────────────────── */
    .main { flex: 1; margin-left: 240px; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(9,9,11,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1a1a1e;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-title { font-size: 14px; font-weight: 600; color: #e4e4e7; }
    .topbar-actions { display: flex; align-items: center; gap: 12px; }
    .topbar-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid #27272a;
      color: #a1a1aa;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .topbar-btn:hover { border-color: #3f3f46; color: #e4e4e7; }
    .content { padding: 24px 32px; max-width: 1200px; }

    /* ── Section Card ───────────────────────────────────────────── */
    .section-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #27272a;
    }
    .section-title { font-size: 14px; font-weight: 600; color: #e4e4e7; }

    /* ── Filter ─────────────────────────────────────────────────── */
    .filter-bar { display: flex; gap: 10px; align-items: center; }
    .filter-select {
      padding: 6px 10px;
      font-size: 12px;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #e4e4e7;
      outline: none;
      cursor: pointer;
    }
    .filter-select:focus { border-color: #8b5cf6; }

    /* ── Table ──────────────────────────────────────────────────── */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #52525b;
      border-bottom: 1px solid #27272a;
      background: #18181b;
      position: sticky;
      top: 0;
    }
    .data-table td {
      padding: 12px 16px;
      font-size: 13px;
      border-bottom: 1px solid #1a1a1e;
      vertical-align: top;
    }
    .data-table tbody tr { transition: background 0.1s ease; }
    .data-table tbody tr:hover { background: rgba(139,92,246,0.05); }
    .data-table tbody tr:last-child td { border-bottom: none; }

    /* ── Badges ─────────────────────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
    }
    .badge-viewer { background: #27272a; color: #a1a1aa; }
    .badge-editor { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .badge-admin { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .badge-super_admin { background: rgba(234,179,8,0.15); color: #fbbf24; }
    .action-badge {
      display: inline-flex;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
    }
    .action-login { background: rgba(34,197,94,0.15); color: #4ade80; }
    .action-list { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .action-create { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .action-update { background: rgba(234,179,8,0.15); color: #fbbf24; }
    .action-delete { background: rgba(239,68,68,0.15); color: #f87171; }

    /* ── Meta JSON ──────────────────────────────────────────────── */
    .meta-json {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      background: #09090b;
      padding: 4px 8px;
      border-radius: 4px;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      color: #a1a1aa;
    }
    .meta-json:hover { white-space: normal; word-break: break-all; }

    /* ── Pagination ─────────────────────────────────────────────── */
    .pagination { display: flex; gap: 8px; justify-content: center; align-items: center; margin-top: 20px; }
    .pagination button {
      padding: 6px 14px;
      font-size: 12px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #a1a1aa;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .pagination button:hover:not(:disabled) { border-color: #3f3f46; color: #e4e4e7; }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
    .pagination .page-info { font-size: 12px; color: #71717a; }

    /* ── Empty State ────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 32px;
      color: #52525b;
      font-size: 13px;
    }

    /* ── Mobile ─────────────────────────────────────────────────── */
    .mobile-toggle {
      display: none;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      border: 1px solid #27272a;
      border-radius: 8px;
      background: transparent;
      color: #a1a1aa;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .mobile-toggle { display: flex; }
      .content { padding: 16px; }
      .topbar { padding: 0 16px; }
      .filter-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="https://lbby.net/assets/lbby-r-studio.png" alt="R Studio">
        <span>R Studio</span>
        <small>Admin</small>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section">Management</div>
        <a href="/" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Users
        </a>
        <a href="/api-keys" class="sidebar-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
          API Keys
        </a>
        <a href="/audit-logs" class="sidebar-link active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Audit Logs
        </a>
        <div class="sidebar-section">External</div>
        <a href="https://lbby.net" class="sidebar-link" target="_blank">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Lbby Dashboard
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">Loading...</div>
          <div class="user-role" id="userRole">—</div>
        </div>
        <button class="logout-btn" onclick="RStudioAuth.logout()">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <span class="topbar-title">Audit Logs</span>
        </div>
        <div class="topbar-actions">
          <button class="topbar-btn" onclick="fetchLogs()">↻ Refresh</button>
        </div>
      </header>

      <div class="content">
        <!-- Filters -->
        <div class="section-card">
          <div class="section-header">
            <span class="section-title">Activity Log</span>
            <div class="filter-bar">
              <select class="filter-select" id="actionFilter" onchange="currentOffset=0;fetchLogs()">
                <option value="">All Actions</option>
                <option value="ADMIN_LOGIN">Login</option>
                <option value="ADMIN_LIST_USERS">List Users</option>
                <option value="ADMIN_LIST_LICENSES">List Licenses</option>
                <option value="ADMIN_GENERATE_LICENSE">Generate License</option>
                <option value="ADMIN_REVOKE_LICENSE">Revoke License</option>
                <option value="ADMIN_UPDATE_USER">Update User</option>
                <option value="ADMIN_DELETE_USER">Delete User</option>
                <option value="ADMIN_LIST_API_KEYS">List API Keys</option>
                <option value="ADMIN_CREATE_API_KEY">Create API Key</option>
                <option value="ADMIN_UPDATE_API_KEY">Update API Key</option>
                <option value="ADMIN_REVOKE_API_KEY">Revoke API Key</option>
              </select>
            </div>
          </div>
          <div id="logsTable">
            <div class="empty-state">Loading...</div>
          </div>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination" style="display:none;">
          <button id="prevBtn" onclick="prevPage()" disabled>← Previous</button>
          <span class="page-info" id="pageInfo">Page 1</span>
          <button id="nextBtn" onclick="nextPage()">Next →</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/lang.js"></script>
  <script src="/auth.js?v=2"></script>
  <script>
    const { apiCall, isVi } = RStudioAuth;
    let currentOffset = 0;
    const PAGE_SIZE = 50;
    let hasMore = true;

    // ── Init ────────────────────────────────────────────────────
    (async function() {
      if (!await RStudioAuth.requireAuth()) return;
      const info = await RStudioAuth.validateKey(RStudioAuth.getApiKey());
      if (info) {
        document.getElementById('userName').textContent = info.keyName || 'Admin';
        document.getElementById('userRole').textContent = info.tier || 'viewer';
        document.getElementById('userAvatar').textContent = (info.keyName || 'A')[0].toUpperCase();
      }
      await fetchLogs();
    })();

    // ── Fetch Logs ──────────────────────────────────────────────
    async function fetchLogs() {
      const el = document.getElementById('logsTable');
      const action = document.getElementById('actionFilter').value;
      const pagination = document.getElementById('pagination');

      try {
        let url = `/api/admin/audit-logs?limit=${PAGE_SIZE}&offset=${currentOffset}`;
        if (action) url += `&action=${encodeURIComponent(action)}`;

        const data = await apiCall('GET', url);
        const logs = data.logs || [];
        hasMore = logs.length >= PAGE_SIZE;

        if (logs.length === 0 && currentOffset === 0) {
          el.innerHTML = '<div class="empty-state">No audit logs yet</div>';
          pagination.style.display = 'none';
          return;
        }

        const rows = logs.map(log => {
          const actionClass = getActionClass(log.action);
          const meta = log.metadata ? `<span class="meta-json" title="${escapeHtml(JSON.stringify(log.metadata))}">${escapeHtml(JSON.stringify(log.metadata))}</span>` : '—';
          return `<tr>
            <td style="white-space:nowrap;color:#71717a;font-size:12px;">${formatTime(log.createdAt)}</td>
            <td>
              <div style="font-weight:600;color:#e4e4e7;">${escapeHtml(log.actorName)}</div>
              <div style="font-size:11px;color:#52525b;">${escapeHtml(log.actorEmailMasked)}</div>
            </td>
            <td><span class="badge badge-${log.actorTier || 'viewer'}">${log.actorTier || 'viewer'}</span></td>
            <td><span class="action-badge ${actionClass}">${formatAction(log.action)}</span></td>
            <td style="font-size:12px;">${escapeHtml(log.targetType)}${log.targetId ? ` #${log.targetId}` : ''}</td>
            <td>${meta}</td>
          </tr>`;
        }).join('');

        el.innerHTML = `<table class="data-table">
          <thead><tr><th>Time</th><th>Actor</th><th>Tier</th><th>Action</th><th>Target</th><th>Details</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;

        pagination.style.display = 'flex';
        document.getElementById('prevBtn').disabled = currentOffset === 0;
        document.getElementById('nextBtn').disabled = !hasMore;
        document.getElementById('pageInfo').textContent = `Page ${Math.floor(currentOffset / PAGE_SIZE) + 1}`;
      } catch (err) {
        el.innerHTML = `<div class="empty-state" style="color:#f87171;">${escapeHtml(err.message)}</div>`;
      }
    }

    function getActionClass(action) {
      if (action.includes('LOGIN')) return 'action-login';
      if (action.includes('LIST')) return 'action-list';
      if (action.includes('CREATE') || action.includes('GENERATE')) return 'action-create';
      if (action.includes('UPDATE')) return 'action-update';
      if (action.includes('DELETE') || action.includes('REVOKE')) return 'action-delete';
      return 'action-list';
    }

    function formatAction(action) {
      return action.replace('ADMIN_', '').replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    }

    function formatTime(ts) {
      if (!ts) return '—';
      return new Date(ts * 1000).toLocaleString();
    }

    function prevPage() {
      if (currentOffset >= PAGE_SIZE) { currentOffset -= PAGE_SIZE; fetchLogs(); }
    }

    function nextPage() {
      if (hasMore) { currentOffset += PAGE_SIZE; fetchLogs(); }
    }

    function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
  </script>
</body>
</html>
