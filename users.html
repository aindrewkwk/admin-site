<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://web.rstudio.live; base-uri 'self'; form-action 'self'; frame-ancestors 'none';">
  <title>Users — R Studio Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="https://lbby.rstudio.live/assets/favicon-32.png">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .users-container { max-width: 1000px; margin: 0 auto; padding: 100px 24px 60px; }
    .users-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
    .users-card h3 { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
    .users-table { width: 100%; font-size: 13px; border-collapse: collapse; }
    .users-table th { text-align: left; padding: 10px 12px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    .users-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .users-table tr:hover { background: var(--bg-elevated); }
    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
    .badge-admin { color: var(--accent); background: rgba(91,157,255,0.12); border: 1px solid rgba(91,157,255,0.25); }
    .badge-user { color: var(--text-muted); background: var(--bg-elevated); border: 1px solid var(--border); }
    .btn-license { padding: 4px 10px; font-size: 11px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
    .btn-license:hover { border-color: var(--accent); color: var(--accent); background: rgba(91,157,255,0.08); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select { padding: 10px 14px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .status-msg { font-size: 13px; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 12px; display: none; }
    .status-msg.success { display: block; color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border); }
    .status-msg.error { display: block; color: var(--red); background: var(--red-bg); border: 1px solid var(--red-border); }
    .output-area { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; word-break: break-all; min-height: 40px; color: var(--text-muted); margin-bottom: 12px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-box { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; text-align: center; }
    .stat-number { font-size: 28px; font-weight: 900; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-brand">
      <img src="https://lbby.rstudio.live/assets/lbby-r-studio.png" alt="R Studio">
      <span>R Studio Admin</span>
    </a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">☰</button>
    <div class="nav-links">
      <a href="index.html" data-vi="Giấy phép">License</a>
      <a href="users.html" class="active" data-vi="Người dùng">Users</a>
      <a href="api-keys.html" data-vi="Khóa API">API Keys</a>
      <a href="https://lbby.rstudio.live">Lbby</a>
      <button onclick="toggleLang()" style="margin-left:auto;padding:4px 10px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-size:12px;cursor:pointer;"><span id="langLabel">VI</span></button>
      <a href="#" onclick="RStudioAuth.logout()" style="opacity:0.6;font-size:13px;" data-vi="Đăng xuất">Logout</a>
    </div>
  </nav>

  <div id="mainContent">
    <div class="users-container">
      <h1 style="font-size: 28px; font-weight: 900; margin-bottom: 8px;">👥 <span data-vi="Người dùng">Users</span></h1>
      <p style="color: var(--text-muted); margin-bottom: 28px;" data-vi="Xem người dùng đã đăng ký và quản lý giấy phép.">View registered users and manage their licenses.</p>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-number" id="totalUsers">-</div>
          <div class="stat-label" data-vi="Tổng người dùng">Total Users</div>
        </div>
        <div class="stat-box">
          <div class="stat-number" id="adminCount">-</div>
          <div class="stat-label" data-vi="Quản trị viên">Admins</div>
        </div>
      </div>

      <div class="users-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h3 style="margin-bottom: 0;" data-vi="📋 Người dùng đã đăng ký">📋 Registered Users</h3>
          <button onclick="fetchUsers()" style="
            padding: 6px 12px; background: var(--bg-elevated); color: var(--text-muted); border: 1px solid var(--border);
            border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.15s;
          " data-vi="↻ Tải lại">↻ Refresh</button>
        </div>
        <div id="usersTable">
          <p style="color: var(--text-muted); font-size: 13px;" data-vi="Đang tải...">Loading...</p>
        </div>
      </div>

      <div class="users-card">
        <h3 data-vi="📜 Tạo giấy phép cho người dùng">📜 Generate License for User</h3>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 12px;" data-vi="Chọn người dùng từ danh sách hoặc nhập email trực tiếp.">
          Select a user from the list above or enter an email directly.
        </p>
        <div class="form-row">
          <div class="form-group">
            <label data-vi="Email người dùng">User Email</label>
            <input type="email" id="genEmail" placeholder="user@example.com">
          </div>
          <div class="form-group">
            <label>Tier</label>
            <select id="genTier">
              <option value="novice">Novice</option>
              <option value="master">Master</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label data-vi="Chu kỳ thanh toán">Billing Cycle</label>
            <select id="genCycle">
              <option value="monthly" data-vi="Hàng tháng (30 ngày)">Monthly (30 days)</option>
              <option value="yearly" data-vi="Hàng năm (365 ngày)">Yearly (365 days)</option>
              <option value="lifetime" data-vi="Trọn đời (10 năm)">Lifetime (10 years)</option>
            </select>
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button onclick="generateLicense()" id="genBtn" style="
              width: 100%; padding: 10px 20px; background: var(--accent); color: white; border: none;
              border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s;
            " data-vi="Tạo giấy phép">Generate License</button>
          </div>
        </div>
        <div id="genStatus" class="status-msg"></div>
        <div id="genOutput" style="display: none;">
          <label style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block;" data-vi="KHÓA GIẤY PHÉP">LICENSE KEY</label>
          <div class="output-area" id="genKey"></div>
          <div style="display: flex; gap: 8px;">
            <button class="btn btn-secondary btn-sm" onclick="navigator.clipboard.writeText(lastGeneratedKey)" data-vi="Sao chép khóa">Copy Key</button>
            <button class="btn btn-secondary btn-sm" onclick="copyActivationMsg()" data-vi="Sao chép tin nhắn kích hoạt">Copy Activation Message</button>
          </div>
        </div>
      </div>
    </div>
    <footer class="footer"><p>&copy; 2026 R Studio. All rights reserved.</p></footer>
  </div>

  <script src="/lang.js"></script>
  <script src="/auth.js"></script>
  <script>
    const { apiCall, isVi } = RStudioAuth;
    let lastGeneratedKey = '';

    (async function() {
      if (!await RStudioAuth.requireAuth()) return;
      await fetchUsers();
    })();

    async function fetchUsers() {
      const el = document.getElementById('usersTable');
      try {
        const data = await apiCall('GET', '/api/admin/users');
        const users = data.users || [];
        const admins = users.filter(u => u.is_admin).length;
        document.getElementById('totalUsers').textContent = users.length;
        document.getElementById('adminCount').textContent = admins;

        if (users.length === 0) { el.innerHTML = `<p style="color:var(--text-muted);font-size:13px;">${isVi() ? 'Chưa có người dùng nào.' : 'No users yet.'}</p>`; return; }

        const rows = users.map(u => {
          const date = new Date(u.created_at * 1000).toLocaleDateString();
          const badge = u.is_admin ? `<span class="badge badge-admin">${isVi() ? 'Quản trị' : 'Admin'}</span>` : `<span class="badge badge-user">${isVi() ? 'Người dùng' : 'User'}</span>`;
          return `<tr>
            <td style="font-weight:600;">${escapeHtml(u.email || '—')}</td>
            <td>${badge}</td>
            <td style="color:var(--text-muted);font-size:12px;">${date}</td>
            <td><button class="btn-license" onclick="selectUser('${escapeHtml(u.email)}')">${isVi() ? 'Tạo giấy phép' : 'Generate License'}</button></td>
          </tr>`;
        }).join('');

        el.innerHTML = `<table class="users-table"><thead><tr>
          <th>${isVi() ? 'Email' : 'Email'}</th>
          <th>${isVi() ? 'Vai trò' : 'Role'}</th>
          <th>${isVi() ? 'Ngày đăng ký' : 'Registered'}</th>
          <th style="text-align:right">${isVi() ? 'Hành động' : 'Action'}</th>
        </tr></thead><tbody>${rows}</tbody></table>`;
      } catch (err) { el.innerHTML = `<p style="color:var(--red);font-size:13px;">${isVi() ? 'Tải thất bại' : 'Failed'}: ${escapeHtml(err.message)}</p>`; }
    }

    function selectUser(email) {
      document.getElementById('genEmail').value = email;
      document.getElementById('genEmail').scrollIntoView({ behavior: 'smooth', block: 'center' });
      document.getElementById('genEmail').focus();
    }

    async function generateLicense() {
      const email = document.getElementById('genEmail').value.trim();
      const tier = document.getElementById('genTier').value;
      const cycle = document.getElementById('genCycle').value;
      const btn = document.getElementById('genBtn');
      const status = document.getElementById('genStatus');
      const output = document.getElementById('genOutput');

      if (!email) { showStatus(isVi() ? 'Nhập email người dùng' : 'Enter a user email', 'error'); return; }

      btn.textContent = isVi() ? 'Đang tạo...' : 'Generating...'; btn.disabled = true;
      status.className = 'status-msg'; status.style.display = 'none'; output.style.display = 'none';

      try {
        const data = await apiCall('POST', '/api/admin/licenses/generate', { email, tier, billing_cycle: cycle });
        lastGeneratedKey = data.licenseKey;
        document.getElementById('genKey').textContent = data.licenseKey;
        output.style.display = 'block';
        const promo = data.promo ? (isVi() ? ' (tài khoản promo đã tạo)' : ' (promo account created)') : '';
        showStatus((isVi() ? `Giấy phép đã tạo cho ${email}` : `License generated for ${email}`) + promo + '!', 'success');
      } catch (err) {
        showStatus((isVi() ? 'Lỗi: ' : 'Error: ') + err.message, 'error');
      } finally { btn.textContent = isVi() ? 'Tạo giấy phép' : 'Generate License'; btn.disabled = false; }
    }

    function showStatus(msg, type) { const el = document.getElementById('genStatus'); el.textContent = msg; el.className = 'status-msg ' + type; }

    function copyActivationMsg() {
      const email = document.getElementById('genEmail').value.trim();
      navigator.clipboard.writeText(isVi()
        ? `🎉 Giấy phép Lbby!\n\nKhóa:\n${lastGeneratedKey}\n\nKích hoạt:\n1. Mở Lbby\n2. Giấy phép → Nâng cao\n3. Dán khóa → Kích hoạt`
        : `🎉 Your Lbby license is ready!\n\nKey:\n${lastGeneratedKey}\n\nActivate:\n1. Open Lbby\n2. License → Advanced\n3. Paste key → Activate`);
    }

    function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
  </script>
</body>
</html>
