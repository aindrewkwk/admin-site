<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://web.lbby.net; base-uri 'self'; form-action 'self';">
  <title>Login — R Studio Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="https://lbby.net/assets/favicon-32.png">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-brand">
      <img src="https://lbby.net/assets/lbby-r-studio.png" alt="R Studio">
      <span>R Studio Admin</span>
    </a>
    <div class="nav-links">
      <button onclick="toggleLang()" style="margin-left:auto;padding:4px 10px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:6px;color:var(--text-muted);font-size:12px;cursor:pointer;"><span id="langLabel">VI</span></button>
    </div>
  </nav>

  <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    <div style="max-width: 420px; width: 100%; text-align: center;">
      <div style="font-size: 48px; margin-bottom: 20px;">🔐</div>
      <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 8px; color: var(--text);" data-vi="Đăng nhập quản trị">Admin Login</h1>
      <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;" data-vi="Nhập khóa API và mật khẩu để truy cập bảng điều khiển.">Enter your API key and password to access the admin panel.</p>

      <div style="text-align: left; margin-bottom: 16px;">
        <label style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;" data-vi="Khóa API">API Key</label>
        <input type="text" id="apiKeyInput" placeholder="lbby_ak_..." autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')document.getElementById('passwordInput').focus()" style="
          width: 100%; padding: 14px 18px;
          background: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: var(--radius-sm);
          color: var(--text); font-size: 15px;
          font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
          outline: none; letter-spacing: 0.5px;
        ">
      </div>

      <div style="text-align: left; margin-bottom: 16px;">
        <label style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;" data-vi="Mật khẩu">Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')doLogin()" style="
          width: 100%; padding: 14px 18px;
          background: var(--bg-card);
          border: 1px solid var(--border);
          border-radius: var(--radius-sm);
          color: var(--text); font-size: 15px;
          font-family: inherit;
          outline: none; letter-spacing: 0.5px;
        ">
      </div>

      <button onclick="doLogin()" id="loginBtn" style="
        width: 100%; padding: 14px 20px;
        background: var(--accent); color: white;
        border: none; border-radius: var(--radius-sm);
        font-size: 16px; font-weight: 700;
        cursor: pointer; transition: all 0.2s;
      " data-vi="Đăng nhập">Log In</button>

      <div id="loginError" style="display: none; margin-top: 16px; padding: 12px; border-radius: var(--radius-sm); color: var(--red); background: var(--red-bg); border: 1px solid var(--red-border); font-size: 13px;"></div>

      <div id="loginSuccess" style="display: none; margin-top: 16px; padding: 12px; border-radius: var(--radius-sm); color: var(--green); background: var(--green-bg); border: 1px solid var(--green-border); font-size: 13px;"></div>

      <div style="margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border);">
        <p style="color: var(--text-muted); font-size: 12px; line-height: 1.6;" data-vi="Không có khóa API? Liên hệ quản trị viên nhóm của bạn để nhận khóa.">
          Don't have an API key? Contact your team admin to get one.
        </p>
      </div>
    </div>
  </div>

  <script src="/lang.js"></script>
  <script src="/auth.js?v=2"></script>
  <script>
    const { getApiKey, setApiKey, setSessionInfo, validateKey, adminLogin, getAttemptState, recordAttempt, resetAttempts, isVi, MAX_ATTEMPTS, LOCKOUT_MS } = RStudioAuth;

    // If already logged in, redirect
    (async function checkExisting() {
      const key = getApiKey();
      if (!key) return;
      const info = await validateKey(key);
      if (info) {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect') || 'index.html';
        window.location.href = redirect;
      } else {
        RStudioAuth.clearApiKey();
      }
    })();

    async function doLogin() {
      const input = document.getElementById('apiKeyInput');
      const pwInput = document.getElementById('passwordInput');
      const error = document.getElementById('loginError');
      const success = document.getElementById('loginSuccess');
      const btn = document.getElementById('loginBtn');
      const key = input.value.trim();
      const password = pwInput.value;

      error.style.display = 'none';
      success.style.display = 'none';

      // Rate limit check
      const attempts = getAttemptState();
      if (attempts.lockUntil && Date.now() < attempts.lockUntil) {
        const secs = Math.ceil((attempts.lockUntil - Date.now()) / 1000);
        error.textContent = isVi() ? `Quá nhiều lần thử. Thử lại sau ${secs}s.` : `Too many attempts. Try again in ${secs}s.`;
        error.style.display = 'block';
        return;
      }

      if (!key) {
        error.textContent = isVi() ? 'Vui lòng nhập khóa API' : 'Please enter your API key';
        error.style.display = 'block';
        return;
      }

      if (!password) {
        error.textContent = isVi() ? 'Vui lòng nhập mật khẩu' : 'Please enter your password';
        error.style.display = 'block';
        pwInput.focus();
        return;
      }

      btn.textContent = isVi() ? 'Đang xác minh...' : 'Verifying...';
      btn.disabled = true;

      try {
        const info = await adminLogin(key, password);
        recordAttempt(false);
        setApiKey(key);
        setSessionInfo({ keyName: info.keyName, tier: info.tier, keyId: info.keyId });

        // If password change is required, show the change form instead of redirecting
        if (info.passwordChangeRequired) {
          showPasswordChangeForm(key, info.keyId);
          return;
        }

        const tierLabel = info.tier === 'super_admin' ? 'Super Admin' : info.tier === 'admin' ? 'Admin' : info.tier === 'editor' ? 'Editor' : 'Viewer';
        success.textContent = isVi()
          ? `Đăng nhập thành công! Xin chào, ${info.keyName} (${tierLabel})`
          : `Logged in! Welcome, ${info.keyName} (${tierLabel})`;
        success.style.display = 'block';

        // Redirect after brief delay
        setTimeout(() => {
          const params = new URLSearchParams(window.location.search);
          const redirect = params.get('redirect') || 'index.html';
          window.location.href = redirect;
        }, 800);
      } catch (err) {
        recordAttempt(true);
        error.textContent = err.message;
        error.style.display = 'block';
        pwInput.value = '';
        pwInput.focus();
      } finally {
        btn.textContent = isVi() ? 'Đăng nhập' : 'Log In';
        btn.disabled = false;
      }
    }

    // ── Forced Password Change ────────────────────────────────────────

    async function showPasswordChangeForm(apiKey, keyId) {
      // Hide the login form
      const loginContainer = document.querySelector('[style*="max-width: 420px"]');
      loginContainer.innerHTML = `
        <div style="font-size: 48px; margin-bottom: 20px;">🔑</div>
        <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 8px; color: var(--text);">${isVi() ? 'Đổi mật khẩu bắt buộc' : 'Password change required'}</h1>
        <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">${isVi() ? 'Mật khẩu tạm thời của bạn cần được thay đổi.' : 'Your temporary password must be changed before continuing.'}</p>

        <div style="text-align: left; margin-bottom: 16px;">
          <label style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;">${isVi() ? 'Mật khẩu mới' : 'New password'}</label>
          <input type="password" id="newPwInput" placeholder="••••••••" autocomplete="new-password" style="
            width: 100%; padding: 14px 18px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text); font-size: 15px; font-family: inherit; outline: none; letter-spacing: 0.5px;
          ">
        </div>

        <div style="text-align: left; margin-bottom: 16px;">
          <label style="font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px;">${isVi() ? 'Xác nhận mật khẩu' : 'Confirm password'}</label>
          <input type="password" id="confirmPwInput" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')doPasswordChange()" style="
            width: 100%; padding: 14px 18px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text); font-size: 15px; font-family: inherit; outline: none; letter-spacing: 0.5px;
          ">
        </div>

        <div id="pwChangeError" class="status-msg error" style="display:none; text-align:left;"></div>
        <div id="pwChangeSuccess" class="status-msg success" style="display:none; text-align:left;"></div>

        <button onclick="doPasswordChange()" id="pwChangeBtn" style="
          width: 100%; padding: 14px 20px; margin-top: 8px;
          background: var(--accent); color: white; border: none; border-radius: var(--radius-sm);
          font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.15s;
        ">${isVi() ? 'Đổi mật khẩu' : 'Change password'}</button>

        <p style="color: var(--text-muted); font-size: 12px; margin-top: 16px;">${isVi() ? 'Tối thiểu 8 ký tự.' : 'Minimum 8 characters.'}</p>
      `;

      document.getElementById('newPwInput').focus();

      window.doPasswordChange = async function() {
        const newPw = document.getElementById('newPwInput').value;
        const confirmPw = document.getElementById('confirmPwInput').value;
        const error = document.getElementById('pwChangeError');
        const success = document.getElementById('pwChangeSuccess');
        const btn = document.getElementById('pwChangeBtn');

        error.style.display = 'none';
        success.style.display = 'none';

        if (!newPw || newPw.length < 8) {
          error.textContent = RStudioAuth.isVi() ? 'Mật khẩu phải có ít nhất 8 ký tự' : 'Password must be at least 8 characters';
          error.style.display = 'block';
          return;
        }
        if (newPw !== confirmPw) {
          error.textContent = RStudioAuth.isVi() ? 'Mật khẩu không khớp' : 'Passwords do not match';
          error.style.display = 'block';
          return;
        }

        btn.textContent = RStudioAuth.isVi() ? 'Đang đổi...' : 'Changing...';
        btn.disabled = true;

        try {
          await RStudioAuth.apiCall('POST', `/api/admin/api-keys/${keyId}/change-password`, {
            key: apiKey,
            newPassword: newPw,
          });

          success.textContent = RStudioAuth.isVi() ? 'Đã đổi mật khẩu! Đang chuyển hướng...' : 'Password changed! Redirecting...';
          success.style.display = 'block';

          setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect') || 'index.html';
            window.location.href = redirect;
          }, 1000);
        } catch (err) {
          error.textContent = err.message;
          error.style.display = 'block';
        } finally {
          btn.textContent = RStudioAuth.isVi() ? 'Đổi mật khẩu' : 'Change password';
          btn.disabled = false;
        }
      };
    }

    // Focus input on load
    document.getElementById('apiKeyInput').focus();
  </script>
</body>
</html>
